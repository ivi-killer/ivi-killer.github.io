<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Archivo</title>
                <style>
                        body {
                                    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                                                background-color: #121212;
                                                            color: #e0e0e0;
                                                                        text-align: center;
                                                                                    padding: 40px 20px;
                                                                                            }
                                                                                                    .login-box {
                                                                                                                background-color: #1e1e1e;
                                                                                                                            padding: 30px;
                                                                                                                                        border-radius: 10px;
                                                                                                                                                    max-width: 350px;
                                                                                                                                                                margin: 40px auto;
                                                                                                                                                                            border: 1px solid #333;
                                                                                                                                                                                    }
                                                                                                                                                                                            h1 { color: #3ecf8e; }
                                                                                                                                                                                                    input {
                                                                                                                                                                                                                width: 90%;
                                                                                                                                                                                                                            padding: 10px;
                                                                                                                                                                                                                                        margin: 10px 0;
                                                                                                                                                                                                                                                    background-color: #2a2a2a;
                                                                                                                                                                                                                                                                border: 1px solid #444;
                                                                                                                                                                                                                                                                            color: white;
                                                                                                                                                                                                                                                                                        border-radius: 5px;
                                                                                                                                                                                                                                                                                                }
                                                                                                                                                                                                                                                                                                        button {
                                                                                                                                                                                                                                                                                                                    width: 95%;
                                                                                                                                                                                                                                                                                                                                padding: 12px;
                                                                                                                                                                                                                                                                                                                                            background-color: #3ecf8e;
                                                                                                                                                                                                                                                                                                                                                        border: none;
                                                                                                                                                                                                                                                                                                                                                                    color: #121212;
                                                                                                                                                                                                                                                                                                                                                                                font-weight: bold;
                                                                                                                                                                                                                                                                                                                                                                                            border-radius: 5px;
                                                                                                                                                                                                                                                                                                                                                                                                        cursor: pointer;
                                                                                                                                                                                                                                                                                                                                                                                                                    margin-top: 10px;
                                                                                                                                                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                                                                                                                                                                </style>
                                                                                                                                                                                                                                                                                                                                                                                                                                </head>
                                                                                                                                                                                                                                                                                                                                                                                                                                <body>

                                                                                                                                                                                                                                                                                                                                                                                                                                    <h1>Bienvenido a mi Web</h1>
                                                                                                                                                                                                                                                                                                                                                                                                                                        <p>Este es un sitio privado. Por favor, inicia sesión para ver las publicaciones.</p>

                                                                                                                                                                                                                                                                                                                                                                                                                                            <!-- FORMULARIO DE INICIO DE SESIÓN -->
                                                                                                                                                                                                                                                                                                                                                                                                                                                <div class="login-box">
                                                                                                                                                                                                                                                                                                                                                                                                                                                        <h3>Iniciar Sesión</h3>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                <input type="email" id="email" placeholder="Tu correo electrónico">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <input type="password" id="password" placeholder="Tu contraseña">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <button onclick="iniciarSesion()">Entrar</button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <!-- CARGAR LIBRERÍA DE SUPABASE -->
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <script src="https://jsdelivr.net"></script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <!-- LÓGICA DE CONEXIÓN Y LOGUEO -->
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                // Extraemos la función nativa correcta del paquete global
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const { createClient } = supabase;

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                // =========================================================
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        // REEMPLAZA ESTOS DOS CAMPOS CON TUS CREDENCIALES REALES
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                // =========================================================
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const SUPABASE_URL = "https://qlxplmhbbztyjtxgpdli.supabase.co";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFseHBsbWhiYnp0eWp0eGdwZGxpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM4MDIyMTYsImV4cCI6MjA5OTM3ODIxNn0.rpBgAyLgd-9KyfPJGfpiKDVzBBYuhz3AihN4jBJgmIo";

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        // Inicializamos la conexión oficial
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const _supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        console.log("¡Conexión exitosa a Supabase realizada!", _supabase);

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                // FUNCIÓN PARA INICIAR SESIÓN
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        async function iniciarSesion() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const emailInput = document.getElementById('email').value;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const passwordInput = document.getElementById('password').value;

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            // Validación simple para que no envíen campos vacíos
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        if (!emailInput || !passwordInput) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        alert("Por favor, rellena todos los campos.");
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        return;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                // Llamada nativa a Supabase para verificar las cuentas
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const { data, error } = await _supabase.auth.signInWithPassword({
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            email: emailInput,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            password: passwordInput,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        });

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    if (error) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    alert("Error al ingresar: " + error.message);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                } else {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                alert("¡Sesión iniciada con éxito! Bienvenido.");
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                console.log("Datos del usuario:", data.user);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                // Aquí programaremos más adelante qué pasa cuando entran (mostrar posts privados)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </html>
