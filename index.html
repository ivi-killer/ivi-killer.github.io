<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ivi-killer // workspace</title>
    <style>
        /* Estilos base con la interfaz oscura de Replit */
        body {
            font-family: 'Fira Code', 'Courier New', Courier, monospace;
            background-color: #0e1118;
            color: #f5f9fc;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 800px;
        }
        header {
            border-bottom: 1px solid #1c2333;
            padding-bottom: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        h1 {
            font-size: 20px;
            color: #00bcd4; /* Azul Replit */
            margin: 0;
        }
        .replit-box {
            background-color: #131722;
            border: 1px solid #242c3d;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        input {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            background-color: #1c2333;
            border: 1px solid #242c3d;
            color: #f5f9fc;
            border-radius: 4px;
            font-family: inherit;
        }
        input:focus {
            border-color: #00bcd4;
            outline: none;
        }
        button {
            background-color: #00bcd4;
            color: #0e1118;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
        }
        button:hover {
            background-color: #00acc1;
        }
        .post {
            border-left: 3px solid #242c3d;
            padding-left: 15px;
            margin: 15px 0;
            text-align: left;
        }
        .post.seleccionado { border-left-color: #ff9800; }
        .post.publico { border-left-color: #4caf50; }
        .badge {
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 3px;
            background: #242c3d;
            margin-left: 10px;
            color: #00bcd4;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>ivi-killer.github.io ~ %</h1>
            <div id="auth-status">Cargando estado...</div>
        </header>

        <!-- FORMULARIO DE LOGIN (CONSOLA REPLIT) -->
        <div id="login-section" class="replit-box" style="display: none;">
            <h3>// Iniciar Sesión</h3>
            <input type="email" id="email" placeholder="user@domain.com">
            <input type="password" id="password" placeholder="••••••••">
            <br><br>
            <button onclick="iniciarSesion()">run login</button>
        </div>

        <!-- PANEL DE CONTROL (SOLO PARA EL ADMIN) -->
        <div id="admin-section" class="replit-box" style="display: none;">
            <h3>// Panel de Administrador</h3>
            <p style="color: #6272a4;">Próximamente: Panel de gestión de usuarios y publicaciones.</p>
        </div>

        <!-- CONTENEDOR PRINCIPAL DE PUBLICACIONES -->
        <div class="replit-box">
            <h3>// Feed de Publicaciones</h3>
            <div id="posts-container">
                <p style="color: #6272a4;">Buscando publicaciones en la base de datos...</p>
            </div>
        </div>
    </div>

    <!-- CONEXIÓN GLOBAL A SUPABASE USANDO MÓDULOS DE JAVASCRIPT -->
    <script type="module">
        import { createClient } from 'https://esm.sh';

        // =========================================================
        // REEMPLAZA ESTOS DOS CAMPOS CON TUS CREDENCIALES REALES
        // =========================================================
        const SUPABASE_URL = "TU_PROJECT_URL_AQUÍ";
        const SUPABASE_ANON_KEY = "TU_ANON_PUBLIC_KEY_AQUÍ";

        // Guardamos la conexión en el objeto global 'window' para que sea accesible
        window._supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        console.log("¡Conexión exitosa a Supabase realizada!", window._supabase);

        // Ejecutamos la verificación de usuario inicial
        verificarUsuario();
    </script>

    <!-- FUNCIONES LÓGICAS DE LA PÁGINA -->
    <script>
        async function verificarUsuario() {
            // Esperamos un milisegundo por si el módulo se está inicializando
            if (!window._supabase) {
                setTimeout(verificarUsuario, 100);
                return;
            }

            const { data: { user } } = await window._supabase.auth.getUser();
            const statusDiv = document.getElementById('auth-status');
            const loginSection = document.getElementById('login-section');
            const adminSection = document.getElementById('admin-section');

            if (user) {
                statusDiv.innerHTML = `Logueado como: <span style="color:#00bcd4">${user.email}</span> <button onclick="cerrarSesion()" style="padding:2px 8px; font-size:12px; margin-left:10px;">logout</button>`;
                loginSection.style.display = "none";
                
                // Si el correo que ingresa es el tuyo, se activa tu panel administrador
                if (user.email === "tu-correo-dueño@gmail.com") {
                    adminSection.style.display = "block";
                }
                
                cargarPosts(true, user.id);
            } else {
                statusDiv.innerHTML = `Invitado // <button onclick="document.getElementById('login-section').style.display='block'" style="padding:2px 8px; font-size:12px;">login</button>`;
                cargarPosts(false, null);
            }
        }

        async function cargarPosts(isLogged, userId) {
            if (!window._supabase) return;

            let query = window._supabase.from('posts').select('*').order('created_at', { ascending: false });

            // Lógica solicitada: Si es invitado, solo ve los posts públicos y limitamos a los 3 últimos
            if (!isLogged) {
                query = query.eq('visibilidad', 'publico').limit(3);
            }

            const { data: posts, error } = await query;
            const container = document.getElementById('posts-container');
            container.innerHTML = "";

            if (error) {
                container.innerHTML = `<p style='color:#ff5555;'>Error de base de datos: ${error.message}</p>`;
                return;
            }

            if (!posts || posts.length === 0) {
                container.innerHTML = "<p style='color:#6272a4;'>No hay publicaciones disponibles para mostrar.</p>";
                return;
            }

            posts.forEach(post => {
                container.innerHTML += `
                    <div class="post ${post.visibilidad}">
                        <h4>> ${post.titulo} <span class="badge">${post.visibilidad}</span></h4>
                        <p>${post.contenido}</p>
                    </div>
                `;
            });
        }

        async function iniciarSesion() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                alert("Completa todos los campos.");
                return;
            }

            const { error } = await window._supabase.auth.signInWithPassword({ email, password });
            if (error) {
                alert("Error al ingresar: " + error.message);
            } else {
                verificarUsuario();
            }
        }

        async function cerrarSesion() {
            await window._supabase.auth.signOut();
            verificarUsuario();
        }
    </script>
</body>
</html>
